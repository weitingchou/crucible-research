image:
  repository: prom/prometheus
  tag: "v2.53.0"
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: "200m"
    memory: 512Mi
  limits:
    cpu: "500m"
    memory: 1Gi

storage:
  storageClassName: "gp3"
  size: 10Gi

service:
  type: ClusterIP
  port: 9090

retention: 15d

# Doris scrape targets — must match the Doris Helm release name and namespace
doris:
  namespace: crucible-benchmarks
  fe:
    service: doris-doris-fe
    port: 8030
  be:
    service: doris-doris-be
    port: 8040
  scrapeInterval: 15s
